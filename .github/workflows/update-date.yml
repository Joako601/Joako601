name: Update README date

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'

jobs:
  update-date:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update date in README
        run: |
          NEW_DATE=$(date +"%d de %B de %Y")
          sed -i "s/Última actualización: .*/Última actualización: ${NEW_DATE}<\/sub>/" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && exit 0
          git add README.md
          git commit -m " Actualizar fecha automáticamente"
          git push
