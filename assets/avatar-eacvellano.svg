<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="90" height="124" viewBox="0 0 90 124">
  <defs>
    <clipPath id="clip-Eacvellano">
      <circle cx="45.0" cy="45.0" r="38.0"/>
    </clipPath>
  </defs>

  <!-- fondo circular -->
  <circle cx="45.0" cy="45.0" r="41.0" fill="#0d0221"/>

  <!-- avatar -->
  <image href="data:image/png;base64," xlink:href="data:image/png;base64," x="4" y="4" width="82" height="82" clip-path="url(#clip-Eacvellano)"/>

  <!-- borde tipo loading spinner: arco punteado que gira en loop -->
  <circle cx="45.0" cy="45.0" r="44.0" fill="none" stroke="#F2A93B"
          stroke-width="2.5" stroke-linecap="round"
          stroke-dasharray="110.0 167.2">
    <animateTransform attributeName="transform" type="rotate"
                       from="0 45.0 45.0" to="360 45.0 45.0"
                       dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- nombre: color oscilando entre naranja y violeta -->
  <text x="45.0" y="112" text-anchor="middle" font-family="monospace"
        font-size="13" font-weight="bold" fill="#F2A93B">
    Eacvellano
    <animate attributeName="fill" values="#F2A93B;#B084F2;#F2A93B"
             dur="3s" repeatCount="indefinite"/>
  </text>
</svg>