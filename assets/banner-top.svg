<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d0221"/>
      <stop offset="40%" stop-color="#1a0a3d"/>
      <stop offset="75%" stop-color="#3d0e2e"/>
      <stop offset="100%" stop-color="#6b1730"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F2A93B" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#F2A93B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#F2A93B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .line1 {
      font-family: 'Fira Code', monospace;
      font-size: 44px;
      font-weight: 700;
      fill: #FCEFCB;
    }
    .line2 {
      font-family: 'Fira Code', monospace;
      font-size: 20px;
      fill: #F2A93B;
      letter-spacing: 4px;
    }

    .typeLine1 {
      overflow: hidden;
      white-space: nowrap;
      animation: typing1 2.2s steps(17, end) forwards, hide1 1.2s 3.2s forwards;
    }
    .typeLine2 {
      overflow: hidden;
      white-space: nowrap;
      opacity: 0;
      animation: reveal2 0.1s 2.4s forwards, typing2 1.6s 2.4s steps(17, end) forwards, hide2 1.2s 5.2s forwards;
    }

    @keyframes typing1 {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }
    @keyframes typing2 {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }
    @keyframes reveal2 { to { opacity: 1; } }
    @keyframes hide1 { to { opacity: 0.15; } }
    @keyframes hide2 { to { opacity: 0.15; } }
  </style>

  <rect width="1200" height="280" fill="url(#sky)"/>

  <!-- far dim stars -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="40" cy="30" r="1"/><circle cx="120" cy="60" r="1"/><circle cx="200" cy="20" r="1.2"/>
    <circle cx="300" cy="80" r="1"/><circle cx="380" cy="40" r="1"/><circle cx="460" cy="70" r="1.3"/>
    <circle cx="540" cy="25" r="1"/><circle cx="620" cy="55" r="1"/><circle cx="700" cy="35" r="1.2"/>
    <circle cx="780" cy="65" r="1"/><circle cx="860" cy="20" r="1"/><circle cx="940" cy="50" r="1.3"/>
    <circle cx="1020" cy="30" r="1"/><circle cx="1100" cy="70" r="1"/><circle cx="1160" cy="40" r="1.2"/>
    <circle cx="80" cy="110" r="1"/><circle cx="260" cy="140" r="1"/><circle cx="440" cy="120" r="1"/>
    <circle cx="600" cy="150" r="1"/><circle cx="780" cy="130" r="1"/><circle cx="960" cy="160" r="1"/>
    <circle cx="1140" cy="140" r="1"/><circle cx="150" cy="200" r="1"/><circle cx="350" cy="220" r="1"/>
    <circle cx="550" cy="210" r="1"/><circle cx="750" cy="230" r="1"/><circle cx="950" cy="215" r="1"/>
    <circle cx="1120" cy="235" r="1"/>
  </g>

  <!-- mid stars, golden -->
  <g fill="#F2A93B">
    <circle cx="150" cy="45" r="1.8"/><circle cx="330" cy="25" r="1.6"/><circle cx="500" cy="55" r="1.8"/>
    <circle cx="680" cy="20" r="1.6"/><circle cx="850" cy="45" r="1.8"/><circle cx="1030" cy="60" r="1.6"/>
    <circle cx="220" cy="90" r="1.5"/><circle cx="410" cy="70" r="1.5"/><circle cx="590" cy="90" r="1.5"/>
    <circle cx="770" cy="75" r="1.5"/><circle cx="950" cy="90" r="1.5"/><circle cx="1120" cy="80" r="1.5"/>
    <circle cx="100" cy="180" r="1.4"/><circle cx="480" cy="190" r="1.4"/><circle cx="860" cy="185" r="1.4"/>
  </g>

  <!-- bright close stars with sparkle -->
  <g fill="#ffffff">
    <circle cx="90" cy="55" r="2.5"/>
    <circle cx="1120" cy="180" r="2.5"/>
    <circle cx="60" cy="220" r="2.3"/>
    <path d="M90 45 L92 55 L90 65 L88 55 Z" opacity="0.7"/>
    <path d="M80 55 L90 57 L100 55 L90 53 Z" opacity="0.7"/>
  </g>

  <!-- moon with glow -->
  <circle cx="1000" cy="75" r="75" fill="url(#moonGlow)"/>
  <circle cx="1000" cy="75" r="28" fill="#FCEFCB"/>
  <circle cx="1011" cy="66" r="4" fill="#E8C978" opacity="0.6"/>
  <circle cx="993" cy="84" r="6" fill="#E8C978" opacity="0.5"/>
  <circle cx="1007" cy="88" r="3" fill="#E8C978" opacity="0.5"/>

  <!-- animated typing text -->
  <g text-anchor="middle">
    <g class="typeLine1">
      <text x="600" y="165" class="line1">Joaquin Uriona</text>
    </g>
    <g class="typeLine2">
      <text x="600" y="200" class="line2">BACKEND DEVELOPER</text>
    </g>
  </g>
</svg>
