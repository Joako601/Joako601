<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circleClip">
      <circle cx="60" cy="60" r="50"/>
    </clipPath>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#F2A93B" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F2A93B" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <style>
    .ring {
      animation: pulse 3s ease-in-out infinite;
      transform-origin: 60px 60px;
    }
    @keyframes pulse {
      0%, 100% { r: 53; opacity: 0.6; }
      50% { r: 57; opacity: 1; }
    }
  </style>

  <!-- anillo animado -->
  <circle class="ring" cx="60" cy="60" r="53" fill="none" stroke="#F2A93B" stroke-width="2"/>

  <!-- foto recortada en circulo -->
  <image href="https://github.com/AriffMedina.png" x="10" y="10" width="100" height="100" clip-path="url(#circleClip)"/>

  <!-- brillo sutil sobre el borde -->
  <circle cx="60" cy="60" r="50" fill="url(#ringGlow)"/>
</svg>
