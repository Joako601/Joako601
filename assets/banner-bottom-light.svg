<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky2Day" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5EC6E8"/>
      <stop offset="30%" stop-color="#8FD9EE"/>
      <stop offset="65%" stop-color="#FBE7A1"/>
      <stop offset="100%" stop-color="#F7C873"/>
    </linearGradient>
    <linearGradient id="cityFarDay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9A6C4"/>
      <stop offset="100%" stop-color="#A883A6"/>
    </linearGradient>
    <linearGradient id="cityNearDay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6E5A78"/>
      <stop offset="100%" stop-color="#4A3B54"/>
    </linearGradient>
    <radialGradient id="sunGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD166" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#FFD166" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <style>
    .cloud1d { animation: driftB1 26s linear infinite; }
    .cloud2d { animation: driftB2 34s linear infinite; }
    @keyframes driftB1 {
      0%   { transform: translateX(-180px); }
      100% { transform: translateX(1380px); }
    }
    @keyframes driftB2 {
      0%   { transform: translateX(-220px); }
      100% { transform: translateX(1420px); }
    }

    .sunPulse2 { animation: sunBreathe2 6s ease-in-out infinite; }
    @keyframes sunBreathe2 {
      0%, 100% { r: 55; opacity: 0.8; }
      50% { r: 60; opacity: 1; }
    }

    .window-a-day { animation: windowFlickerDay 3s ease-in-out infinite; }
    .window-b-day { animation: windowFlickerDay 4.5s ease-in-out infinite; }
    .window-c-day { animation: windowFlickerDay 5.5s ease-in-out infinite; }
    @keyframes windowFlickerDay {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    .birds2 { animation: birdFly2 20s linear infinite; opacity: 0; }
    @keyframes birdFly2 {
      0%   { transform: translate(-40px, 0); opacity: 0; }
      5%   { opacity: 0.6; }
      45%  { opacity: 0.6; }
      50%  { transform: translate(480px, -15px); opacity: 0; }
      100% { transform: translate(480px, -15px); opacity: 0; }
    }

    .sparkle-a-day { animation: sparkleDay 3s ease-in-out infinite; }
    .sparkle-b-day { animation: sparkleDay 4s ease-in-out infinite; }
    @keyframes sparkleDay {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.75; }
    }
  </style>

  <rect width="1200" height="200" fill="url(#sky2Day)"/>

  <!-- nubes -->
  <g fill="#FFFFFF" opacity="0.85">
    <g class="cloud1d" transform="translate(0,30)">
      <ellipse cx="0" cy="0" rx="36" ry="14"/>
      <ellipse cx="26" cy="-6" rx="24" ry="12"/>
      <ellipse cx="-24" cy="5" rx="20" ry="10"/>
    </g>
    <g class="cloud2d" transform="translate(500,45)">
      <ellipse cx="0" cy="0" rx="30" ry="12"/>
      <ellipse cx="22" cy="-5" rx="18" ry="9"/>
    </g>
    <g class="cloud1d" transform="translate(850,25)">
      <ellipse cx="0" cy="0" rx="34" ry="13"/>
      <ellipse cx="24" cy="-6" rx="22" ry="11"/>
      <ellipse cx="-22" cy="5" rx="18" ry="9"/>
    </g>
  </g>

  <!-- destellos ambientales -->
  <g fill="#FFF3D6">
    <circle cx="200" cy="20" r="1.6" class="sparkle-a-day"/>
    <circle cx="700" cy="30" r="1.6" class="sparkle-b-day"/>
    <circle cx="1140" cy="60" r="1.4" class="sparkle-a-day"/>
  </g>

  <!-- pajaros -->
  <g stroke="#4A3B54" stroke-width="1.4" fill="none" opacity="0.6" class="birds2">
    <path d="M120 60 q5 -7 10 0 q5 -7 10 0"/>
    <path d="M145 50 q4 -6 8 0 q4 -6 8 0"/>
  </g>

  <!-- sol, echoing top banner -->
  <circle cx="1080" cy="55" r="55" fill="url(#sunGlow2)" class="sunPulse2"/>
  <circle cx="1080" cy="55" r="20" fill="#FFD166"/>
  <circle cx="1080" cy="55" r="20" fill="none" stroke="#FFE9B0" stroke-width="1.5" opacity="0.7"/>

  <!-- far skyline silhouette -->
  <g fill="url(#cityFarDay)" opacity="0.9">
    <rect x="0" y="140" width="1200" height="60"/>
    <rect x="40" y="115" width="26" height="85"/>
    <rect x="80" y="125" width="20" height="75"/>
    <rect x="980" y="120" width="24" height="80"/>
    <rect x="1020" y="130" width="18" height="70"/>
  </g>

  <!-- windows on far buildings -->
  <g fill="#FFE9B0">
    <rect x="47" y="125" width="3" height="4" class="window-a-day"/>
    <rect x="47" y="140" width="3" height="4" class="window-b-day"/>
    <rect x="57" y="132" width="3" height="4" class="window-c-day"/>
    <rect x="86" y="135" width="3" height="4" class="window-a-day"/>
    <rect x="86" y="150" width="3" height="4" class="window-c-day"/>
    <rect x="986" y="130" width="3" height="4" class="window-b-day"/>
    <rect x="986" y="145" width="3" height="4" class="window-a-day"/>
    <rect x="1026" y="140" width="3" height="4" class="window-c-day"/>
  </g>

  <!-- near buildings, Obelisco y Piramide -->
  <g fill="url(#cityNearDay)">
    <rect x="0" y="160" width="1200" height="40"/>
    <rect x="140" y="135" width="24" height="65"/>
    <rect x="175" y="145" width="18" height="55"/>
    <rect x="900" y="140" width="24" height="60"/>
    <rect x="935" y="148" width="18" height="52"/>
    <!-- Obelisco de Buenos Aires -->
    <path d="M418 200 L418 90 L428 60 L438 90 L438 200 Z"/>
    <rect x="414" y="200" width="28" height="6"/>
    <!-- Piramide mesoamericana escalonada -->
    <path d="M690 200 L690 175 L710 175 L710 155 L730 155 L730 135 L750 135 L750 115 L770 115 L770 135 L790 135 L790 155 L810 155 L810 175 L830 175 L830 200 Z"/>
    <rect x="754" y="115" width="12" height="85" fill="#4A3B54"/>
  </g>

  <!-- windows on near buildings -->
  <g fill="#FFE9B0">
    <rect x="147" y="145" width="3" height="4" class="window-b-day"/>
    <rect x="147" y="160" width="3" height="4" class="window-a-day"/>
    <rect x="155" y="152" width="3" height="4" class="window-c-day"/>
    <rect x="180" y="155" width="3" height="4" class="window-a-day"/>
    <rect x="907" y="150" width="3" height="4" class="window-c-day"/>
    <rect x="907" y="165" width="3" height="4" class="window-b-day"/>
    <rect x="940" y="158" width="3" height="4" class="window-a-day"/>
  </g>

  <!-- sol de mayo sobre el Obelisco -->
  <g transform="translate(428,45)" opacity="0.4">
    <circle r="7" fill="#C97F2A"/>
    <g stroke="#C97F2A" stroke-width="1.3">
      <line x1="0" y1="-12" x2="0" y2="-9"/>
      <line x1="0" y1="12" x2="0" y2="9"/>
      <line x1="-12" y1="0" x2="-9" y2="0"/>
      <line x1="12" y1="0" x2="9" y2="0"/>
    </g>
  </g>

  <!-- detalle azteca sobre la piramide -->
  <g transform="translate(760,105)" opacity="0.4">
    <circle r="6" fill="#C97F2A"/>
    <g stroke="#C97F2A" stroke-width="1.3">
      <line x1="-9" y1="-9" x2="-6" y2="-6"/>
      <line x1="9" y1="-9" x2="6" y2="-6"/>
      <line x1="-9" y1="9" x2="-6" y2="6"/>
      <line x1="9" y1="9" x2="6" y2="6"/>
    </g>
  </g>
</svg>
